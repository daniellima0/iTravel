<div class="login-page">
    <!-- Login Container -->
    <div class="login-container">
      <!-- Esquerda: Formulário de Login -->
      <div class="left">
        <h2>iTravel... lorem</h2>
        <p>Welcome back! Please login to your account.</p>
  
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <!-- Campo de Email -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" formControlName="email" placeholder="Enter your email" />
          </div>
  
          <!-- Campo de Senha -->
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" formControlName="password" placeholder="Enter your password" />
          </div>
  
          <!-- Opções: Lembrar e Esqueceu a Senha -->
          <div class="form-options">
            <label>
              <input type="checkbox" formControlName="rememberMe" />
              Remember Me
            </label>
            <a href="#">Forgot Password?</a>
          </div>
  
          <!-- Botões de Login e Criar Conta -->
          <button type="submit" class="primary-button" [disabled]="loginForm.invalid">Login</button>
          <button type="button" class="secondary-button">Create Account</button>
        </form>
  
        <!-- Login Social -->
        <div class="social-login">
          <p>Or login with:</p>
          <div class="icons">
            <button class="facebook">Facebook</button>
            <button class="linkedin">LinkedIn</button>
            <button class="google">Google</button>
          </div>
        </div>
      </div>
  
      <!-- Direita: Imagem -->
      <div class="right">
        <img src="assets/images/map-and-compass.png" alt="Map and Compass" />
      </div>
    </div>
  </div>
